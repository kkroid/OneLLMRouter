services:
  onecc:
    build: ./copilot-anthropic-proxy
    image: onecc:latest
    container_name: onecc
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3456
      - OUT_DIR=/out
      - GITHUB_TOKEN_FILE=/host-config/github_token
      - MODELS_CONF=/host-config/models.conf
      - http_proxy=http://host.containers.internal:1082
      - https_proxy=http://host.containers.internal:1082
    ports:
      - "3456:3456"
    volumes:
      - ./copilot-anthropic-proxy:/host-config:ro
      - ./out:/out
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3456/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s


