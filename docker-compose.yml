services:
  copilot-anthropic:
    # 精简 Anthropic API 代理，专供 Claude Code CLI 使用
    build: ./copilot-anthropic-proxy
    image: copilot-anthropic-proxy:latest
    container_name: copilot-anthropic
    restart: unless-stopped
    environment:
      - PORT=4142
      - GITHUB_TOKEN_FILE=/host-config/github_token
      - MODELS_CONF=/host-config/models.conf
      - http_proxy=http://host.containers.internal:1082
      - https_proxy=http://host.containers.internal:1082
    ports:
      - "4142:4142"
    volumes:
      - ./copilot-anthropic-proxy:/host-config:ro
    networks:
      - internal

  9router:
    image: ghcr.io/decolua/9router:latest
    container_name: 9router
    restart: unless-stopped
    depends_on:
      - copilot-anthropic
    volumes:
      - 9router-data:/app/data
    environment:
      PORT: "3456"
    ports:
      - "3456:3456"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3456/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  register-providers:
    image: ghcr.io/ericc-ch/copilot-api:latest
    container_name: register-providers
    depends_on:
      9router:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./register-providers.sh:/register.sh:ro
      - ./out:/out
    entrypoint: ["/bin/sh", "/register.sh"]
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  9router-data:


